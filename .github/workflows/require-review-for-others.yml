name: require-review-for-others

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  pull_request_review:
    types:
      - submitted
      - dismissed

jobs:
  check:
    name: Require review (non-self authors)
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      # No native "review required only for non-owner PRs" exists in branch
      # protection or rulesets — those are actor-based (whoever merges
      # bypasses), not author-based. This reimplements it as a required
      # status check instead: self-authored PRs (TRUSTED_PR_AUTHORS) skip
      # the requirement entirely (avoids the self-approval deadlock GitHub
      # enforces at the platform level), everyone/everything else — Devin,
      # any future external contributor — needs an actual approving review.
      #
      # Configurable without a code change:
      #   gh variable set TRUSTED_PR_AUTHORS --body "getappz,some-other-login"
      # Unset defaults to "getappz" only.
      - name: Evaluate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          TRUSTED: ${{ vars.TRUSTED_PR_AUTHORS || 'getappz' }}
        run: |
          set -euo pipefail
          if echo ",$TRUSTED," | grep -qi ",$PR_AUTHOR,"; then
            echo "Author '$PR_AUTHOR' is trusted ($TRUSTED) — no review required."
            exit 0
          fi

          approvals=$(gh api "repos/${{ github.repository }}/pulls/$PR_NUMBER/reviews" \
            --jq '[.[] | select(.state=="APPROVED")] | length')
          if [ "$approvals" -gt 0 ]; then
            echo "PR has $approvals approving review(s) — pass."
            exit 0
          fi

          echo "Author '$PR_AUTHOR' is not in TRUSTED_PR_AUTHORS ($TRUSTED) and this PR has no approving review yet."
          exit 1
