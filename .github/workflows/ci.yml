name: ci

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'push' }}

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          filters: |
            code:
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'build.rs'
              - 'crates/**'
              - 'src/**'
              - '.github/workflows/ci.yml'

  build:
    needs: changes
    if: always()
    permissions:
      contents: read
    # A hung test would otherwise pin a runner for GitHub's 6h default and
    # block the branch's required check indefinitely; fail fast instead. A
    # cold-cache build+test finishes well under this on every OS.
    timeout-minutes: 25
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    env:
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "true"
    steps:
      # `if: always()` above + this fallback keeps the job fail-closed: if
      # `changes` errors or gets cancelled instead of cleanly resolving,
      # needs.changes.result != 'success' and we build/test anyway rather
      # than silently reporting a green required check for unbuilt code.
      # Steps are individually gated (not the job) so `build (<os>)` still
      # reports a fast success on docs-only PRs — a job-level skip would
      # leave the branch-protection required check pending forever.
      - if: needs.changes.result != 'success' || needs.changes.outputs.code == 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - if: needs.changes.result != 'success' || needs.changes.outputs.code == 'true'
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2 # zizmor: ignore[cache-poisoning] save-if already gates writes to master
        with:
          save-if: ${{ github.ref == 'refs/heads/master' }}
      - if: needs.changes.result != 'success' || needs.changes.outputs.code == 'true'
        uses: mozilla-actions/sccache-action@d651010b8da762cde178750d8eda7b5febfe147a # v0.0.9
      - if: needs.changes.result != 'success' || needs.changes.outputs.code == 'true'
        run: cargo build --workspace --verbose
      - if: needs.changes.result != 'success' || needs.changes.outputs.code == 'true'
        run: cargo test --workspace --verbose

  clippy:
    needs: changes
    if: always()
    permissions:
      contents: read
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - if: needs.changes.result != 'success' || needs.changes.outputs.code == 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - if: needs.changes.result != 'success' || needs.changes.outputs.code == 'true'
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          components: clippy
      - if: needs.changes.result != 'success' || needs.changes.outputs.code == 'true'
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2 # zizmor: ignore[cache-poisoning] save-if already gates writes to master
        with:
          save-if: ${{ github.ref == 'refs/heads/master' }}
      # The root [lints.rust] unsafe_code and sub-crate [lints.clippy]
      # pedantic overrides are deliberately warn-only, not deny — exempt both
      # groups here so this gate doesn't silently escalate that policy.
      - if: needs.changes.result != 'success' || needs.changes.outputs.code == 'true'
        run: cargo clippy --locked --workspace --all-targets --all-features -- -D warnings -A unsafe_code -A clippy::pedantic

  fmt:
    needs: changes
    if: always()
    permissions:
      contents: read
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - if: needs.changes.result != 'success' || needs.changes.outputs.code == 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - if: needs.changes.result != 'success' || needs.changes.outputs.code == 'true'
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          components: rustfmt
      - if: needs.changes.result != 'success' || needs.changes.outputs.code == 'true'
        run: cargo fmt --check

  deny:
    # No paths filter, same rationale as security-check.yml's audit job: a
    # path-filtered required check never reports on PRs that skip it,
    # blocking the merge forever. cargo-deny is cheap enough to run always.
    name: cargo-deny
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2
        with:
          manifest-path: Cargo.toml

  target-dir-guard:
    # Fails fast if CARGO_TARGET_DIR is set project-wide (e.g. a repo/org
    # Actions variable) instead of being left to Cargo's per-checkout
    # default. Ambient CARGO_TARGET_DIR always outranks a worktree's local
    # .cargo/config.toml (see src/worktree.rs's isolate_worktree_target_dir),
    # so if it ever leaked in here it would silently share build artifacts
    # across the `build` matrix jobs. No paths filter, same rationale as
    # `deny`: a path-filtered required check never reports on PRs that skip
    # it. See item #133/#139.
    name: Ambient CARGO_TARGET_DIR guard
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Fail if CARGO_TARGET_DIR is set
        shell: bash
        env:
          # A repo/org/environment Actions *variable* doesn't reach the shell
          # unless mapped into `env` explicitly — map it so this guard also
          # catches CARGO_TARGET_DIR configured that way, not just an
          # ambient runner-environment value.
          CARGO_TARGET_DIR_VAR: ${{ vars.CARGO_TARGET_DIR }}
        run: |
          if [ -n "${CARGO_TARGET_DIR:-}" ] || [ -n "${CARGO_TARGET_DIR_VAR:-}" ]; then
            echo "::error::CARGO_TARGET_DIR is set (env=${CARGO_TARGET_DIR:-<unset>}, vars.CARGO_TARGET_DIR=${CARGO_TARGET_DIR_VAR:-<unset>}) — a project-wide target dir leaks build artifacts across worktrees/CI jobs. Unset it (see item #133/#139)." >&2
            exit 1
          fi

  # Single aggregating gate. Point branch protection at THIS job instead of
  # every leg above — stays correct when jobs are added/removed and can't be
  # bypassed by a silently-missing required check.
  ci-green:
    name: CI Green
    if: always()
    needs:
      - build
      - clippy
      - fmt
      - deny
      - target-dir-guard
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Verify no required job failed
        shell: bash
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          echo "$NEEDS_JSON"
          python3 - <<'PY'
          import json, os, sys

          needs = json.loads(os.environ["NEEDS_JSON"])
          blocked = {k: v["result"] for k, v in needs.items()
                     if v["result"] in ("failure", "cancelled")}
          if blocked:
              print("Required CI jobs did not pass:", blocked)
              sys.exit(1)
          print("All required CI jobs passed (success or skipped).")
          PY
