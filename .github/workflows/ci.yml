name: ci

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'push' }}

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          filters: |
            code:
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'build.rs'
              - 'crates/**'
              - 'src/**'
              - '.github/workflows/ci.yml'

  build:
    needs: changes
    if: always()
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    env:
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "true"
    steps:
      # `if: always()` above + this fallback keeps the job fail-closed: if
      # `changes` errors or gets cancelled instead of cleanly resolving,
      # needs.changes.result != 'success' and we build/test anyway rather
      # than silently reporting a green required check for unbuilt code.
      # Steps are individually gated (not the job) so `build (<os>)` still
      # reports a fast success on docs-only PRs — a job-level skip would
      # leave the branch-protection required check pending forever.
      - if: needs.changes.result != 'success' || needs.changes.outputs.code == 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - if: needs.changes.result != 'success' || needs.changes.outputs.code == 'true'
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2 # zizmor: ignore[cache-poisoning] save-if already gates writes to master
        with:
          save-if: ${{ github.ref == 'refs/heads/master' }}
      - if: needs.changes.result != 'success' || needs.changes.outputs.code == 'true'
        uses: mozilla-actions/sccache-action@d651010b8da762cde178750d8eda7b5febfe147a # v0.0.9
      - if: needs.changes.result != 'success' || needs.changes.outputs.code == 'true'
        run: cargo build --workspace --verbose
      - if: needs.changes.result != 'success' || needs.changes.outputs.code == 'true'
        run: cargo test --workspace --verbose
