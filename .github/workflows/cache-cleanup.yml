name: cache-cleanup

on:
  # zizmor: ignore[dangerous-triggers] — pull_request_target is required so forked
  # PRs get a write-scoped token to delete their own caches; no PR code is
  # checked out or executed, only the trusted workflow from the base branch runs.
  pull_request_target:
    types: [closed]

permissions:
  actions: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete caches for this PR's branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_REF: refs/pull/${{ github.event.pull_request.number }}/merge
        run: |
          gh cache list --repo "$REPO" --ref "$PR_REF" --limit 1000 --json id -q '.[].id' \
            | xargs -r -I{} gh cache delete {} --repo "$REPO"
