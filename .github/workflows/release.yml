name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (native)
        if: ${{ !matrix.cross }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Package (unix)
        if: matrix.archive == 'tar.gz'
        run: |
          cd target/${{ matrix.target }}/release
          tar -czf ../../../leanstack-${{ matrix.target }}.tar.gz leanstack
          cd -

      - name: Package (windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          Compress-Archive -Path target/${{ matrix.target }}/release/leanstack.exe -DestinationPath leanstack-${{ matrix.target }}.zip

      - uses: actions/upload-artifact@v4
        with:
          name: leanstack-${{ matrix.target }}
          path: leanstack-${{ matrix.target }}.*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS
          cd -

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

  update-homebrew:
    name: Update Homebrew
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Download checksums and extract platform hashes
        id: checksums
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

          gh release download "${GITHUB_REF_NAME}" \
            --repo getappz/leanstack --pattern "SHA256SUMS" --dir .

          AARCH64_DARWIN=$(grep "aarch64-apple-darwin" SHA256SUMS | awk '{print $1}')
          X86_64_DARWIN=$(grep "x86_64-apple-darwin" SHA256SUMS | awk '{print $1}')
          AARCH64_LINUX_GNU=$(grep "aarch64-unknown-linux-gnu" SHA256SUMS | awk '{print $1}')
          X86_64_LINUX_GNU=$(grep "x86_64-unknown-linux-gnu" SHA256SUMS | awk '{print $1}')

          echo "aarch64_darwin_sha=${AARCH64_DARWIN}" >> "$GITHUB_OUTPUT"
          echo "x86_64_darwin_sha=${X86_64_DARWIN}" >> "$GITHUB_OUTPUT"
          echo "aarch64_linux_sha=${AARCH64_LINUX_GNU}" >> "$GITHUB_OUTPUT"
          echo "x86_64_linux_sha=${X86_64_LINUX_GNU}" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Clone and generate formula
        run: |
          VERSION="${{ steps.checksums.outputs.version }}"
          AARCH64_DARWIN_SHA="${{ steps.checksums.outputs.aarch64_darwin_sha }}"
          X86_64_DARWIN_SHA="${{ steps.checksums.outputs.x86_64_darwin_sha }}"
          AARCH64_LINUX_SHA="${{ steps.checksums.outputs.aarch64_linux_sha }}"
          X86_64_LINUX_SHA="${{ steps.checksums.outputs.x86_64_linux_sha }}"

          git clone "https://x-access-token:${HOMEBREW_TOKEN}@github.com/getappz/homebrew-leanstack.git"
          cd homebrew-leanstack
          mkdir -p Formula

          cat > Formula/leanstack.rb <<EOF
          class Leanstack < Formula
            desc "lean-ctx + engram powered token-saving stack for AI coding agents"
            homepage "https://github.com/getappz/leanstack"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/getappz/leanstack/releases/download/v${VERSION}/leanstack-aarch64-apple-darwin.tar.gz"
                sha256 "${AARCH64_DARWIN_SHA}"
              else
                url "https://github.com/getappz/leanstack/releases/download/v${VERSION}/leanstack-x86_64-apple-darwin.tar.gz"
                sha256 "${X86_64_DARWIN_SHA}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/getappz/leanstack/releases/download/v${VERSION}/leanstack-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "${AARCH64_LINUX_SHA}"
              else
                url "https://github.com/getappz/leanstack/releases/download/v${VERSION}/leanstack-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${X86_64_LINUX_SHA}"
              end
            end

            def install
              bin.install "leanstack"
            end

            test do
              assert_match "leanstack ${VERSION}", shell_output("#{bin}/leanstack --version")
            end
          end
          EOF
          sed -i 's/^          //' Formula/leanstack.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/leanstack.rb
          git diff --cached --quiet || git commit -m "leanstack ${VERSION}"
          git push
        env:
          HOMEBREW_TOKEN: ${{ secrets.HOMEBREW_GITHUB_TOKEN }}

  update-scoop:
    name: Update Scoop
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - name: Download checksums and extract windows hash
        id: checksums
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

          gh release download "${GITHUB_REF_NAME}" \
            --repo getappz/leanstack --pattern "SHA256SUMS" --dir .

          WINDOWS_SHA=$(grep "x86_64-pc-windows-msvc" SHA256SUMS | awk '{print $1}')
          echo "windows_sha=${WINDOWS_SHA}" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Generate manifest and push to main
        run: |
          VERSION="${{ steps.checksums.outputs.version }}"
          WINDOWS_SHA="${{ steps.checksums.outputs.windows_sha }}"

          mkdir -p bucket

          cat > bucket/leanstack.json <<EOF
          {
            "version": "${VERSION}",
            "description": "lean-ctx + engram powered token-saving stack for AI coding agents",
            "homepage": "https://github.com/getappz/leanstack",
            "license": "MIT",
            "url": "https://github.com/getappz/leanstack/releases/download/v${VERSION}/leanstack-x86_64-pc-windows-msvc.zip",
            "hash": "sha256:${WINDOWS_SHA}",
            "bin": "leanstack.exe",
            "checkver": "github",
            "autoupdate": {
              "url": "https://github.com/getappz/leanstack/releases/download/v\$version/leanstack-x86_64-pc-windows-msvc.zip"
            }
          }
          EOF

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bucket/leanstack.json
          git diff --cached --quiet || git commit -m "scoop manifest: leanstack ${VERSION}"
          git push origin HEAD:master

  update-winget:
    name: Update Winget
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: vedantmgoyal2009/winget-releaser@v2
        with:
          identifier: getappz.leanstack
          installers-regex: 'x86_64-pc-windows-msvc\.zip$'
          token: ${{ secrets.WINGET_GITHUB_TOKEN }}
