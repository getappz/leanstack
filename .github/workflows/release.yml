name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (native)
        if: ${{ !matrix.cross }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Package (unix)
        if: matrix.archive == 'tar.gz'
        run: |
          cd target/${{ matrix.target }}/release
          tar -czf ../../../agentflare-${{ matrix.target }}.tar.gz agentflare
          cd -

      - name: Package (windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          Compress-Archive -Path target/${{ matrix.target }}/release/agentflare.exe -DestinationPath agentflare-${{ matrix.target }}.zip

      - uses: actions/upload-artifact@v7
        with:
          name: agentflare-${{ matrix.target }}
          path: agentflare-${{ matrix.target }}.*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS
          cd -

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          generate_release_notes: true

  update-homebrew:
    name: Update Homebrew
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Download checksums and extract platform hashes
        id: checksums
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

          gh release download "${GITHUB_REF_NAME}" \
            --repo getappz/agentflare --pattern "SHA256SUMS" --dir .

          AARCH64_DARWIN=$(grep "aarch64-apple-darwin" SHA256SUMS | awk '{print $1}')
          X86_64_DARWIN=$(grep "x86_64-apple-darwin" SHA256SUMS | awk '{print $1}')
          AARCH64_LINUX_GNU=$(grep "aarch64-unknown-linux-gnu" SHA256SUMS | awk '{print $1}')
          X86_64_LINUX_GNU=$(grep "x86_64-unknown-linux-gnu" SHA256SUMS | awk '{print $1}')

          echo "aarch64_darwin_sha=${AARCH64_DARWIN}" >> "$GITHUB_OUTPUT"
          echo "x86_64_darwin_sha=${X86_64_DARWIN}" >> "$GITHUB_OUTPUT"
          echo "aarch64_linux_sha=${AARCH64_LINUX_GNU}" >> "$GITHUB_OUTPUT"
          echo "x86_64_linux_sha=${X86_64_LINUX_GNU}" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Clone and generate formula
        run: |
          VERSION="${{ steps.checksums.outputs.version }}"
          AARCH64_DARWIN_SHA="${{ steps.checksums.outputs.aarch64_darwin_sha }}"
          X86_64_DARWIN_SHA="${{ steps.checksums.outputs.x86_64_darwin_sha }}"
          AARCH64_LINUX_SHA="${{ steps.checksums.outputs.aarch64_linux_sha }}"
          X86_64_LINUX_SHA="${{ steps.checksums.outputs.x86_64_linux_sha }}"

          git clone "https://x-access-token:${HOMEBREW_TOKEN}@github.com/getappz/homebrew-agentflare.git"
          cd homebrew-agentflare
          mkdir -p Formula

          cat > Formula/agentflare.rb <<EOF
          class Agentflare < Formula
            desc "Optimize AI CLI agents for cost and performance"
            homepage "https://github.com/getappz/agentflare"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/getappz/agentflare/releases/download/v${VERSION}/agentflare-aarch64-apple-darwin.tar.gz"
                sha256 "${AARCH64_DARWIN_SHA}"
              else
                url "https://github.com/getappz/agentflare/releases/download/v${VERSION}/agentflare-x86_64-apple-darwin.tar.gz"
                sha256 "${X86_64_DARWIN_SHA}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/getappz/agentflare/releases/download/v${VERSION}/agentflare-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "${AARCH64_LINUX_SHA}"
              else
                url "https://github.com/getappz/agentflare/releases/download/v${VERSION}/agentflare-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${X86_64_LINUX_SHA}"
              end
            end

            def install
              bin.install "agentflare"
            end

            test do
              assert_match "agentflare ${VERSION}", shell_output("#{bin}/agentflare --version")
            end
          end
          EOF
          sed -i 's/^          //' Formula/agentflare.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/agentflare.rb
          git diff --cached --quiet || git commit -m "agentflare ${VERSION}"
          git push
        env:
          HOMEBREW_TOKEN: ${{ secrets.HOMEBREW_GITHUB_TOKEN }}

  update-scoop:
    name: Update Scoop
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: master
          # Owner PAT (user-approved 2026-07-06): master's required-checks
          # protection rejects pushes from the default GITHUB_TOKEN (GH006);
          # enforce_admins is off, so a push authenticated as the admin owner
          # goes through for this generated one-file manifest commit.
          token: ${{ secrets.CLA_SIGNATURES_TOKEN }}

      - name: Download checksums and extract windows hash
        id: checksums
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

          gh release download "${GITHUB_REF_NAME}" \
            --repo getappz/agentflare --pattern "SHA256SUMS" --dir .

          WINDOWS_SHA=$(grep "x86_64-pc-windows-msvc" SHA256SUMS | awk '{print $1}')
          echo "windows_sha=${WINDOWS_SHA}" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Generate manifest and push to master
        run: |
          VERSION="${{ steps.checksums.outputs.version }}"
          WINDOWS_SHA="${{ steps.checksums.outputs.windows_sha }}"

          mkdir -p bucket

          cat > bucket/agentflare.json <<EOF
          {
            "version": "${VERSION}",
            "description": "Optimize AI CLI agents for cost and performance",
            "homepage": "https://github.com/getappz/agentflare",
            "license": "MIT",
            "url": "https://github.com/getappz/agentflare/releases/download/v${VERSION}/agentflare-x86_64-pc-windows-msvc.zip",
            "hash": "sha256:${WINDOWS_SHA}",
            "bin": "agentflare.exe",
            "checkver": "github",
            "autoupdate": {
              "url": "https://github.com/getappz/agentflare/releases/download/v\$version/agentflare-x86_64-pc-windows-msvc.zip"
            }
          }
          EOF

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bucket/agentflare.json
          git diff --cached --quiet || git commit -m "scoop manifest: agentflare ${VERSION}"
          git push origin HEAD:master
