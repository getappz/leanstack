[package]
name = "agentflare"
version = "1.0.1"
edition = "2021"
description = "Optimize AI CLI agents for cost and performance. Zero fluff, zero runtime deps."
license = "MIT"
repository = "https://github.com/getappz/agentflare"

[[bin]]
name = "agentflare"
path = "src/main.rs"

[dependencies]
clap = { version = "4", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
dirs = "6"
chrono = "0.4"

[profile.release]
opt-level = 3
lto = "thin"
strip = true
